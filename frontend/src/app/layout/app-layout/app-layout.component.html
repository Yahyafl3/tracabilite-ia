<div class="layout-wrapper" [ngClass]="containerClass()">
  <app-topbar />
  <app-sidebar />
  <div class="layout-main-container">
    <div class="layout-main">
      <router-outlet />
    </div>
  </div>
  @if (containerClass()['layout-mobile-active'] || containerClass()['layout-overlay-active']) {
    <div class="layout-mask" (click)="layoutService.closeMobileMenu()" aria-hidden="true"></div>
  }
</div>
