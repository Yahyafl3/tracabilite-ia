<header class="navbar" [class.navbar--scrolled]="scrolled()">
  <div class="container navbar__inner">
    <a
      class="brand"
      href="#accueil"
      (click)="scrollTo('accueil'); $event.preventDefault()"
      aria-label="Traçabilité IA — Accueil"
    >
      <app-logo class="brand__mark" [size]="38" />
      <span class="brand__name">Traçabilité<span class="brand__accent"> IA</span></span>
    </a>

    <nav class="nav-links" [class.nav-links--open]="menuOpen()" aria-label="Navigation principale">
      @for (link of links; track link.target) {
        <a
          class="nav-links__item"
          [href]="'#' + link.target"
          (click)="scrollTo(link.target); $event.preventDefault()"
          >{{ link.label }}</a
        >
      }

      <div class="nav-links__actions">
        <a
          class="nav-links__login"
          routerLink="/auth/login"
          (click)="menuOpen.set(false)"
        >
          Se connecter
        </a>
        <a
          class="btn btn-primary nav-links__cta"
          routerLink="/auth/login"
          (click)="menuOpen.set(false)"
        >
          Accéder à l'application
          <app-icon name="arrow-right" [size]="18" />
        </a>
      </div>
    </nav>

    <div class="nav-actions">
      <a
        class="nav-actions__login"
        routerLink="/auth/login"
      >
        Se connecter
      </a>
      <a
        class="btn btn-primary nav-actions__cta"
        routerLink="/auth/login"
      >
        Accéder à l'application
        <app-icon name="arrow-right" [size]="18" />
      </a>
      <button
        type="button"
        class="theme-toggle"
        (click)="toggleTheme()"
        [attr.aria-label]="theme() === 'dark' ? 'Activer le mode clair' : 'Activer le mode sombre'"
        title="Changer de thème"
      >
        <app-icon [name]="theme() === 'dark' ? 'sun' : 'moon'" [size]="20" />
      </button>

      <button
        type="button"
        class="nav-toggle"
        (click)="toggleMenu()"
        [attr.aria-expanded]="menuOpen()"
        [attr.aria-label]="menuOpen() ? 'Fermer le menu' : 'Ouvrir le menu'"
      >
        <app-icon [name]="menuOpen() ? 'close' : 'menu'" [size]="26" />
      </button>
    </div>
  </div>
</header>
