services:
  postgres:
    image: postgres:16-alpine
    container_name: tracabilite-postgres
    environment:
      POSTGRES_DB: tracabilite_ia
      POSTGRES_USER: tracabilite
      POSTGRES_PASSWORD: tracabilite123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tracabilite-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracabilite -d tracabilite_ia"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    container_name: tracabilite-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tracabilite_ia
      SPRING_DATASOURCE_USERNAME: tracabilite
      SPRING_DATASOURCE_PASSWORD: tracabilite123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      ML_SERVICE_URL: ${ML_SERVICE_URL:-http://ml-service:5000}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL_1: ${OPENROUTER_MODEL_1:-meta-llama/llama-3.3-70b-instruct:free}
      OPENROUTER_MODEL_2: ${OPENROUTER_MODEL_2:-google/gemma-4-26b-a4b-it:free}
      OPENROUTER_MODEL_3: ${OPENROUTER_MODEL_3:-openai/gpt-oss-20b:free}
      OPENROUTER_AGENT_1_FALLBACK: ${OPENROUTER_AGENT_1_FALLBACK:-}
      OPENROUTER_AGENT_2_FALLBACK: ${OPENROUTER_AGENT_2_FALLBACK:-}
      OPENROUTER_AGENT_3_FALLBACK: ${OPENROUTER_AGENT_3_FALLBACK:-}
      OPENROUTER_USE_FREE_ROUTER: ${OPENROUTER_USE_FREE_ROUTER:-false}
      OPENROUTER_HTTP_REFERER: ${OPENROUTER_HTTP_REFERER:-http://localhost}
      OPENROUTER_APP_TITLE: ${OPENROUTER_APP_TITLE:-Tracabilite-IA}
      OPENROUTER_AGENT_DELAY_MS: ${OPENROUTER_AGENT_DELAY_MS:-3000}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      GROQ_MODEL_1: ${GROQ_MODEL_1:-llama-3.3-70b-versatile}
      GROQ_MODEL_2: ${GROQ_MODEL_2:-openai/gpt-oss-120b}
      GROQ_MODEL_3: ${GROQ_MODEL_3:-openai/gpt-oss-20b}
      GROQ_CONNECT_TIMEOUT_MS: ${GROQ_CONNECT_TIMEOUT_MS:-10000}
      GROQ_READ_TIMEOUT_MS: ${GROQ_READ_TIMEOUT_MS:-120000}
      GROQ_MAX_RETRIES: ${GROQ_MAX_RETRIES:-2}
      GROQ_AGENT_DELAY_MS: ${GROQ_AGENT_DELAY_MS:-1000}
    depends_on:
      postgres:
        condition: service_healthy
      ml-service:
        condition: service_started
    networks:
      - tracabilite-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tracabilite-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - tracabilite-network
    restart: unless-stopped

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
      network: host
    container_name: tracabilite-ml-service
    ports:
      - "5000:5000"
    networks:
      - tracabilite-network
    restart: unless-stopped
    volumes:
      - ./ml-service/artifacts:/app/artifacts
      - ./ml-service/data:/app/data

networks:
  tracabilite-network:
    driver: bridge

volumes:
  postgres_data:
