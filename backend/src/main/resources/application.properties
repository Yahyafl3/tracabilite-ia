spring.application.name=tracabilite-ia

# Base de donnees PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tracabilite_ia}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:tracabilite}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:tracabilite123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true

# Pas obligatoire avec PostgreSQL moderne
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Eviter les requetes JPA pendant le rendu
spring.jpa.open-in-view=false

# Serveur
server.port=8080

# Encodage UTF-8
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true
spring.jackson.default-property-inclusion=non_null

spring.web.locale=fr_FR
spring.web.locale-resolver=fixed

# JWT
jwt.secret=${JWT_SECRET:tracabilite-ia-super-secret-key-please-change-in-production-0123456789}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# OpenRouter (agents generatifs)
openrouter.base-url=${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
openrouter.api-key=${OPENROUTER_API_KEY:}
openrouter.model-1=${OPENROUTER_MODEL_1:meta-llama/llama-3.3-70b-instruct:free}
openrouter.model-2=${OPENROUTER_MODEL_2:google/gemma-4-26b-a4b-it:free}
openrouter.model-3=${OPENROUTER_MODEL_3:openai/gpt-oss-20b:free}
openrouter.agent-1-fallback=${OPENROUTER_AGENT_1_FALLBACK:}
openrouter.agent-2-fallback=${OPENROUTER_AGENT_2_FALLBACK:}
openrouter.agent-3-fallback=${OPENROUTER_AGENT_3_FALLBACK:}
openrouter.http-referer=${OPENROUTER_HTTP_REFERER:http://localhost}
openrouter.app-title=${OPENROUTER_APP_TITLE:Tracabilite-IA}
openrouter.connect-timeout-ms=${OPENROUTER_CONNECT_TIMEOUT_MS:5000}
openrouter.read-timeout-ms=${OPENROUTER_READ_TIMEOUT_MS:120000}
openrouter.agent-delay-ms=${OPENROUTER_AGENT_DELAY_MS:3000}
openrouter.models-cache-ttl-ms=${OPENROUTER_MODELS_CACHE_TTL_MS:300000}
openrouter.use-free-router=${OPENROUTER_USE_FREE_ROUTER:false}

# Groq (agents generatifs — nouvelles decisions)
groq.base-url=${GROQ_BASE_URL:https://api.groq.com/openai/v1}
groq.api-key=${GROQ_API_KEY:}
groq.model-1=${GROQ_MODEL_1:llama-3.3-70b-versatile}
groq.model-2=${GROQ_MODEL_2:openai/gpt-oss-120b}
groq.model-3=${GROQ_MODEL_3:openai/gpt-oss-20b}
groq.connect-timeout-ms=${GROQ_CONNECT_TIMEOUT_MS:10000}
groq.read-timeout-ms=${GROQ_READ_TIMEOUT_MS:120000}
groq.max-retries=${GROQ_MAX_RETRIES:2}
groq.agent-delay-ms=${GROQ_AGENT_DELAY_MS:1000}

# ML service
ml.service.url=${ML_SERVICE_URL:http://ml-service:5000}

# Logs de diagnostic
logging.level.org.springframework.security=DEBUG
logging.level.com.pfa.tracabilite_ia.filter=DEBUG
logging.level.com.pfa.tracabilite_ia.controller=DEBUG
logging.level.com.pfa.tracabilite_ia.ai=DEBUG